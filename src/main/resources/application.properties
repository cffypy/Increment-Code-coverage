spring.application.name=super-jacoco
server.port=8899
spring.session.store-type=none
# Mybatis 配置
mybatis.typeAliasesPackage=com.xiaoju.basetech.entity
mybatis.mapper-locations=classpath*:mapper/*.xml
spring.web.resources.static-locations=file:${user.home}/report
spring.mvc.static-path-pattern=/**
server.servlet.encoding.force=true
# SpringDoc OpenAPI 配置
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# 禁用 Spring Boot 对 DataSource 的自动配置（由 Apollo + HikariCP 手动管理）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

